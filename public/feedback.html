<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>反馈</title>
    <meta name="description" content="提交模组反馈" />
    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("site-theme");
          const theme = saved || "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/styles.css?v=20260608-01" />
    <style>
      .feedback-bug-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
      }

      .feedback-select-dark {
        color: #111827;
        background: rgba(255, 255, 255, 0.94);
      }

      .feedback-select-dark option {
        color: #111827;
        background: #ffffff;
      }

      .feedback-bug-dropzone {
        min-height: 100%;
        color: #111827;
        background: rgba(255, 255, 255, 0.94);
        border-color: rgba(17, 24, 39, 0.16);
      }

      .feedback-bug-dropzone .hint {
        color: rgba(17, 24, 39, 0.72);
      }

      .feedback-bug-dropzone .btn {
        color: #111827;
        background: rgba(255, 255, 255, 0.84);
        border-color: rgba(17, 24, 39, 0.16);
      }

      @media (max-width: 560px) {
        .feedback-bug-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-transition is-hidden" id="page-transition" aria-hidden="true">
      <div class="page-transition__inner">
        <svg class="page-transition__spinner" viewBox="0 0 50 50" aria-hidden="true">
          <circle r="25" cx="25" cy="25"></circle>
        </svg>
        <p class="page-transition__text">LOADING</p>
      </div>
    </div>
        <script>
      (() => {
        try {
          const raw = sessionStorage.getItem("page-transition-pending");
          if (!raw) return;
          const at = Number(raw);
          const overlay = document.getElementById("page-transition");
          if (!(overlay instanceof HTMLElement)) return;
          if (Number.isFinite(at) && Date.now() - at < 8000) {
            overlay.classList.remove("is-hidden", "is-leaving");
            overlay.classList.add("is-spinning");
            overlay.dataset.shownAt = String(performance.now());
            document.body.classList.add("is-page-transitioning");
          } else {
            sessionStorage.removeItem("page-transition-pending");
          }
        } catch {
        }
      })();
    </script><header class="topbar">
      <a class="brand" href="/">
        <img class="brand__logo" src="/assets/logo.png" alt="Logo" onerror="this.onerror=null;this.src='/logo.svg';" />
        <span class="brand__text">模组官网</span>
      </a>
      <nav class="nav">
        <a href="/">返回首页</a>
        <a href="/workshop.html">创意工坊</a>
        <a class="nav__btn" href="/admin.html" data-auth-required="1" data-auth-min-level="2" hidden>后台查看</a>
        <button class="theme-toggle" type="button" data-theme-toggle="1" aria-label="切换主题">
          <span class="theme-toggle__icon" data-theme-icon>☀</span>
          <span class="theme-toggle__label" data-theme-label>亮色</span>
        </button>
      </nav>
    </header>

    <main>
      <section class="section section--tight">
        <div class="section__head">
          <h1 class="h1">反馈</h1>
          <p>提交后会写入服务器后台，开发者可直接查看。</p>
        </div>

        <form class="form" id="form">
          <div class="field">
            <div class="field__label">反馈类型</div>
            <select class="input feedback-select-dark" name="type" id="feedback-type">
              <option value="suggestion">建议</option>
              <option value="bug">Bug 反馈</option>
            </select>
          </div>

          <div class="field">
            <div class="field__label" id="title-label">标题</div>
            <input class="input" name="title" id="title-input" maxlength="80" required placeholder="一句话概括你的建议" />
          </div>

          <div class="field">
            <div class="field__label" id="content-label">您想提出什么样的建议，什么样的修改</div>
            <textarea class="textarea" name="content" id="content-input" maxlength="4000" required placeholder="例如：希望新增什么功能、调整什么设计、为什么这样改会更合适"></textarea>
          </div>

          <div class="grid feedback-bug-grid" id="bug-fields" hidden>
            <div class="field">
              <div class="field__label">Bug 图片上传</div>
              <div class="dropzone feedback-bug-dropzone" id="bug-image-dropzone">
                <div>拖动图片到这里，或点击选择图片</div>
                <div class="hint">支持 png / jpg / jpeg / webp / gif，可多选，单张不超过 10MB。</div>
                <button class="btn btn--ghost" type="button" id="bug-image-pick">选择图片</button>
                <input id="bug-image-input" type="file" accept="image/*" multiple hidden />
                <div class="hint" id="bug-image-picked">未选择图片</div>
              </div>
            </div>

            <div class="field">
              <div class="field__label">日志文件上传</div>
              <div class="dropzone feedback-bug-dropzone" id="bug-file-dropzone">
                <div>拖动文件到这里，或点击选择文件</div>
                <div class="hint">可上传日志、配置、压缩包等辅助文件，可多选，单个不超过 20MB。</div>
                <button class="btn btn--ghost" type="button" id="bug-file-pick">选择文件</button>
                <input id="bug-file-input" type="file" multiple hidden />
                <div class="hint" id="bug-file-picked">未选择文件</div>
              </div>
            </div>
          </div>

          <div class="grid grid--3" style="max-width: 760px;">
            <div class="field">
              <div class="field__label">游戏版本</div>
              <input class="input" name="gameVersion" maxlength="40" placeholder="例如 1.21.1" />
            </div>
            <div class="field">
              <div class="field__label">模组版本</div>
              <input class="input" name="modVersion" maxlength="60" placeholder="例如 1.0.5b3-fix" />
            </div>
            <div class="field">
              <div class="field__label">联系方式（可选）</div>
              <input class="input" name="contact" maxlength="80" placeholder="QQ / 邮箱" />
            </div>
          </div>

          <div class="form__actions">
            <div class="hint">请勿填写隐私信息；内容会被后台直接看到。</div>
            <button class="btn btn--primary" type="submit">提交反馈</button>
          </div>
        </form>

        <div class="toast" id="toast"></div>
      </section>
    </main>

    <script type="module" src="/assets/site.js?v=20260612-01"></script>
    <script type="module" src="/assets/feedback.js?v=20260612-01"></script>
  </body>
</html>
