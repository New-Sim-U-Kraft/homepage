<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册账号</title>
    <meta name="description" content="注册 New-Sim-U-Kraft 账号" />
    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("site-theme");
          const theme = saved || "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/styles.css?v=20260612-01" />
  </head>

  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <img class="brand__logo" src="/assets/logo.png" alt="Logo" onerror="this.onerror=null;this.src='/logo.svg';" />
        <span class="brand__text">模组官网</span>
      </a>
      <nav class="nav">
        <a href="/">返回首页</a>
        <a href="/admin.html">登录</a>
        <button class="theme-toggle" type="button" data-theme-toggle="1" aria-label="切换主题">
          <span class="theme-toggle__icon" data-theme-icon>☀</span>
          <span class="theme-toggle__label" data-theme-label>亮色</span>
        </button>
      </nav>
    </header>

    <main>
      <section class="section section--tight">
        <div class="section__head">
          <h1 class="h1">注册账号</h1>
          <p>邮箱验证注册;注册后默认为普通用户(游客),可由管理员后续提升权限。</p>
        </div>

        <form class="form" id="register-form" style="max-width: 480px;">
          <div class="field">
            <div class="field__label">邮箱</div>
            <div class="row" style="display:flex; gap:8px;">
              <input class="input" id="reg-email" type="email" placeholder="用于接收验证码" required style="flex:1;" />
              <button class="btn" type="button" id="send-code-btn" style="white-space:nowrap;">获取验证码</button>
            </div>
          </div>
          <div class="field">
            <div class="field__label">验证码</div>
            <input class="input" id="reg-code" inputmode="numeric" maxlength="6" placeholder="6 位邮箱验证码" required />
          </div>
          <div class="field">
            <div class="field__label">账户名</div>
            <input class="input" id="reg-username" maxlength="24" placeholder="2-24 位,中文/字母/数字/_/-" required />
          </div>
          <div class="field">
            <div class="field__label">显示名称</div>
            <input class="input" id="reg-display-name" maxlength="20" placeholder="页面展示的昵称" required />
          </div>
          <div class="field">
            <div class="field__label">QQ 号(选填,填了将自动使用 QQ 头像)</div>
            <input class="input" id="reg-qq" maxlength="12" inputmode="numeric" placeholder="例如:123456789" />
          </div>
          <div class="field">
            <div class="field__label">密码</div>
            <input class="input" id="reg-password" type="password" maxlength="72" placeholder="8-72 位" required />
          </div>
          <div class="form__actions">
            <div class="hint">已有账号?<a href="/admin.html">去登录</a></div>
            <button class="btn btn--primary" type="submit">注册</button>
          </div>
        </form>

        <div class="toast" id="register-toast"></div>
      </section>
    </main>

    <script type="module" src="/assets/site.js?v=20260612-01"></script>
    <script type="module" src="/assets/register.js?v=20260612-01"></script>
  </body>
</html>
