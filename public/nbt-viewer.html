<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NBT Viewer</title>
    <meta name="description" content="查看创意工坊上传的 NBT 文件结构预览。" />
    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("site-theme");
          const theme = saved || "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/styles.css?v=20260612-01" />
    <style>
      .nbt-modal { position: fixed; inset: 0; z-index: 9000; display: flex;
        align-items: center; justify-content: center; padding: 20px; }
      .nbt-modal[hidden] { display: none; }
      .nbt-modal__backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.55); }
      .nbt-modal__box { position: relative; z-index: 1; width: min(820px, 100%);
        max-height: 82vh; display: flex; flex-direction: column; border-radius: 14px;
        background: var(--bg, #fff); color: var(--text); border: 1px solid var(--line);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35); overflow: hidden; }
      .nbt-modal__head { display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; border-bottom: 1px solid var(--line); }
      .nbt-modal__close { border: none; background: transparent; color: var(--text);
        font-size: 18px; cursor: pointer; line-height: 1; padding: 4px 8px; border-radius: 8px; }
      .nbt-modal__close:hover { background: rgba(0,0,0,0.08); }
      .nbt-modal__body { margin: 0; padding: 14px 16px; overflow: auto; flex: 1;
        white-space: pre; font-size: 12px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <img class="brand__logo" src="/assets/logo.png" alt="Logo" onerror="this.onerror=null;this.src='/logo.svg';" />
        <span class="brand__text">NBT Viewer</span>
      </a>
      <nav class="nav">
        <a href="/workshop.html">创意工坊</a>
        <a href="/">首页</a>
        <button class="theme-toggle" type="button" data-theme-toggle="1" aria-label="切换主题">
          <span class="theme-toggle__icon" data-theme-icon>☀</span>
          <span class="theme-toggle__label" data-theme-label>亮色</span>
        </button>
      </nav>
    </header>

    <main>
      <section class="section">
        <div class="section__head" data-kicker="nbt">
          <h1 class="h1">NBT Viewer</h1>
          <p>这里会显示创意工坊作品上传的 NBT 结构预览，方便快速检查结构内容是否正确。</p>
        </div>
        <div class="nbt-viewer">
          <div class="panel">
            <div class="nbt-viewer__toolbar">
              <div class="nbt-viewer__meta" id="nbt-meta">
                <span>正在加载 NBT 文件...</span>
              </div>
              <div class="button-row">
                <button class="btn btn--ghost" type="button" id="nbt-reset-view">重置视角</button>
                <a class="btn btn--ghost" href="/workshop.html">返回创意工坊</a>
                <a class="btn btn--ghost" href="#" id="nbt-raw-link" target="_blank" rel="noreferrer" hidden>下载原始 NBT</a>
              </div>
            </div>
          </div>
          <div class="panel nbt-viewer__stage">
            <canvas class="nbt-viewer__canvas" id="nbt-canvas" aria-label="NBT 三维预览"></canvas>
            <div class="nbt-viewer__empty" id="nbt-stage-status">正在生成 3D 预览...</div>
          </div>
          <div style="margin-top: 12px;">
            <button class="btn btn--ghost" type="button" id="nbt-raw-open">查看原始结构数据</button>
          </div>
        </div>
      </section>
    </main>

    <!-- 原始结构数据弹窗 -->
    <div class="nbt-modal" id="nbt-modal" hidden>
      <div class="nbt-modal__backdrop" data-nbt-close="1"></div>
      <div class="nbt-modal__box" role="dialog" aria-modal="true" aria-label="原始结构数据">
        <div class="nbt-modal__head">
          <strong>原始结构数据</strong>
          <button class="nbt-modal__close" type="button" id="nbt-raw-close" aria-label="关闭">✕</button>
        </div>
        <pre class="nbt-modal__body" id="nbt-content">正在加载预览...</pre>
      </div>
    </div>

    <script type="module" src="/assets/site.js?v=20260612-01"></script>
    <script type="module" src="/assets/nbt-viewer.js?v=20260608-02"></script>
    <script>
      (() => {
        const modal = document.getElementById("nbt-modal");
        const openBtn = document.getElementById("nbt-raw-open");
        const closeBtn = document.getElementById("nbt-raw-close");
        if (!modal || !openBtn) return;
        const show = () => { modal.hidden = false; };
        const hide = () => { modal.hidden = true; };
        openBtn.addEventListener("click", show);
        if (closeBtn) closeBtn.addEventListener("click", hide);
        modal.querySelectorAll("[data-nbt-close]").forEach((n) => n.addEventListener("click", hide));
        document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !modal.hidden) hide(); });
      })();
    </script>
  </body>
</html>
