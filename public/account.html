<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>账户设置</title>
    <meta name="description" content="管理你的账户资料" />
    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("site-theme");
          const theme = saved || "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="/assets/styles.css?v=20260608-01" />
  </head>

  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <img class="brand__logo" src="/assets/logo.png" alt="Logo" onerror="this.onerror=null;this.src='/logo.svg';" />
        <span class="brand__text">模组官网</span>
      </a>
      <nav class="nav">
        <a href="/">返回首页</a>
        <a href="/workshop.html">创意工坊</a>
        <button class="theme-toggle" type="button" data-theme-toggle="1" aria-label="切换主题">
          <span class="theme-toggle__icon" data-theme-icon>☀</span>
          <span class="theme-toggle__label" data-theme-label>亮色</span>
        </button>
      </nav>
    </header>

    <main>
      <section class="section section--tight">
        <div class="section__head">
          <h1 class="h1">账户设置</h1>
          <p id="account-who">加载中…</p>
        </div>

        <!-- 未登录提示 -->
        <div class="panel" id="account-guard" style="max-width:480px;" hidden>
          <p>请先登录后再管理账户。</p>
          <a class="btn btn--primary" href="/login.html">去登录</a>
        </div>

        <div id="account-body" hidden>
          <!-- 资料 -->
          <div class="panel" style="max-width:560px; padding:16px;">
            <h2 style="margin:0 0 10px;">基本资料</h2>
            <div style="display:flex; gap:14px; align-items:center; margin-bottom:12px;">
              <img id="account-avatar-preview" src="/assets/logo.png" alt="头像"
                   style="width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid rgba(255,255,255,0.12);"
                   onerror="this.onerror=null;this.src='/assets/logo.png';" />
              <div>
                <input id="account-avatar-file" type="file" accept=".png,.jpg,.jpeg,.webp,.gif,image/*" />
                <div class="hint">上传自定义头像(≤10MB);不传则用 QQ 头像</div>
              </div>
            </div>
            <form class="form" id="profile-form">
              <div class="field">
                <div class="field__label">显示名称</div>
                <input class="input" id="account-display-name" maxlength="20" required />
              </div>
              <div class="field">
                <div class="field__label">QQ 号(填了将自动使用 QQ 头像)</div>
                <input class="input" id="account-qq" maxlength="12" inputmode="numeric" placeholder="选填" />
              </div>
              <div class="field">
                <div class="field__label">一句话简介</div>
                <input class="input" id="account-intro" maxlength="80" placeholder="选填" />
              </div>
              <div class="form__actions">
                <div class="hint">登录名:<span id="account-username">—</span> / 身份:<span id="account-role">—</span></div>
                <button class="btn btn--primary" type="submit">保存资料</button>
              </div>
            </form>
            <div class="toast" id="profile-toast"></div>
          </div>

          <!-- 改密码 -->
          <div class="panel" style="max-width:560px; padding:16px; margin-top:14px;">
            <h2 style="margin:0 0 10px;">修改密码</h2>
            <form class="form" id="password-form">
              <div class="field">
                <div class="field__label">当前密码</div>
                <input class="input" id="account-old-password" type="password" required />
              </div>
              <div class="field">
                <div class="field__label">新密码(8-72 位)</div>
                <input class="input" id="account-new-password" type="password" minlength="8" maxlength="72" required />
              </div>
              <div class="form__actions">
                <div class="hint"></div>
                <button class="btn btn--primary" type="submit">修改密码</button>
              </div>
            </form>
            <div class="toast" id="password-toast"></div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/site.js?v=20260612-01"></script>
    <script type="module" src="/assets/account.js?v=20260612-01"></script>
  </body>
</html>
