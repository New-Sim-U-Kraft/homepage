<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>全部作品 · 创意工坊</title>
    <link rel="icon" href="/assets/logo.png" type="image/png" />
    <script>
      (() => { try { const s = localStorage.getItem("site-theme"); const t = s || "light"; document.documentElement.dataset.theme = t; document.documentElement.style.colorScheme = t; } catch { document.documentElement.dataset.theme = "dark"; document.documentElement.style.colorScheme = "dark"; } })();
    </script>
    <link rel="stylesheet" href="/assets/styles.css?v=20260710-02" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/"><img class="brand__logo" src="/assets/logo.png" alt="Logo" onerror="this.onerror=null;this.src='/logo.svg';" /><span class="brand__text">NewSimUKraft</span></a>
      <nav class="nav">
        <a href="/">首页</a>
        <a href="/workshop.html">创意工坊</a>
        <a class="nav__btn" href="/workshop-submit.html">我要投稿</a>
        <button class="theme-toggle" type="button" data-theme-toggle="1" aria-label="切换主题"><span class="theme-toggle__icon" data-theme-icon>☀</span><span class="theme-toggle__label" data-theme-label>亮色</span></button>
      </nav>
    </header>

    <main>
      <section class="section">
        <div class="section__head section__head--row" data-kicker="approved">
          <div>
            <h1 class="h1">全部作品</h1>
            <p>所有审核通过的创意工坊作品。</p>

          </div>
        </div>
        <div class="workshop-grid" id="workshop-grid">
          <div class="panel panel--empty">创意工坊内容加载中...</div>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/site.js?v=20260710-02"></script>
    <script type="module" src="/assets/workshop.js?v=20260710-02"></script>
  </body>
</html>
